<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Read the full article on BlogSphere.">
    <title>Blog Post — BlogSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../assets/css/styles.css" rel="stylesheet">
    <style>
        .blog-content {
            font-size: 17px;
            line-height: 1.9;
        }

        .blog-content h3 {
            margin: 32px 0 16px;
            font-size: 24px;
        }

        .blog-content p {
            margin-bottom: 20px;
            color: var(--clr-text-secondary);
        }

        .blog-content blockquote {
            border-left: 4px solid var(--clr-primary);
            padding: 16px 24px;
            margin: 24px 0;
            background: var(--clr-surface);
            border-radius: 0 var(--radius-btn) var(--radius-btn) 0;
            font-style: italic;
            color: var(--clr-text);
        }

        .blog-hero-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: var(--radius-modal);
            box-shadow: var(--shadow-hover);
        }

        .share-btn {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-circle);
            border: 1px solid var(--clr-border);
            color: var(--clr-text-secondary);
            transition: var(--transition);
            cursor: pointer;
            background: #fff;
        }

        .share-btn:hover {
            background: var(--clr-gradient);
            color: #fff;
            border-color: transparent;
            transform: scale(1.1);
        }

        .like-btn {
            cursor: pointer;
            transition: var(--transition);
        }

        .like-btn:hover,
        .like-btn.liked {
            color: var(--clr-error);
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="../../index.html"><i class="bi bi-globe2"></i> BlogSphere</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="../../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog-listing.html">Blogs</a></li>
                    <li class="nav-item"><a class="nav-link" href="category.html">Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="search-results.html">Search</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <a href="login.html" class="btn btn-ghost">Login</a>
                    <a href="register.html" class="btn btn-gradient">Get Started</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- BLOG CONTENT -->
    <section style="padding-top:100px;" class="section-padding">
        <div class="container">
            <div class="row g-5">
                <!-- Main Content -->
                <div class="col-lg-8">
                    <div class="fade-in" id="blogContent">
                        <!-- Rendered by JS -->
                    </div>

                    <!-- Comments Section -->
                    <div class="mt-5 pt-4 border-top" id="commentsSection">
                        <h4 class="mb-4"><i class="bi bi-chat-dots me-2"></i>Comments</h4>

                        <!-- Add Comment -->
                        <div class="card-custom p-4 mb-4">
                            <h6 class="mb-3">Leave a Comment</h6>
                            <textarea class="form-control form-control-custom mb-3" rows="3" id="commentText"
                                placeholder="Write your thoughts..."></textarea>
                            <button class="btn btn-gradient btn-sm" id="postCommentBtn">Post Comment</button>
                        </div>

                        <div id="commentsList">
                            <!-- Rendered by JS -->
                        </div>
                    </div>
                </div>

                <!-- Sidebar -->
                <div class="col-lg-4">
                    <!-- Author Widget -->
                    <div class="sidebar-widget" id="authorWidget">
                        <!-- Rendered by JS -->
                    </div>

                    <!-- Related Posts -->
                    <div class="sidebar-widget">
                        <h5>Related Posts</h5>
                        <div id="relatedPosts">
                            <!-- Rendered by JS -->
                        </div>
                    </div>

                    <!-- Tags -->
                    <div class="sidebar-widget">
                        <h5>Tags</h5>
                        <div id="tagCloud">
                            <!-- Rendered by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer-section">
        <div class="container">
            <div class="footer-bottom" style="border-top:none; margin-top:0;">
                <p>&copy; 2025 BlogSphere. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div id="toastContainer" style="position:fixed; top:80px; right:20px; z-index:9999; width:360px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../models/UserModel.js"></script>
    <script src="../../models/BlogModel.js"></script>
    <script src="../../models/CategoryModel.js"></script>
    <script src="../../models/CommentModel.js"></script>
    <script src="../../controllers/MainController.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const blogId = parseInt(getUrlParam('id')) || 1;
            const blog = blogModel.getById(blogId);

            if (!blog) {
                document.getElementById('blogContent').innerHTML = `
          <div class="empty-state">
            <i class="bi bi-file-earmark-x"></i>
            <h4>Blog not found</h4>
            <p>The article you're looking for doesn't exist or has been removed.</p>
            <a href="blog-listing.html" class="btn btn-gradient">Browse Articles</a>
          </div>`;
                return;
            }

            const author = userModel.getById(blog.authorId);
            const category = categoryModel.getById(blog.categoryId);

            // Update page title
            document.title = `${blog.title} — BlogSphere`;

            // Render main content
            document.getElementById('blogContent').innerHTML = `
        <nav aria-label="breadcrumb" class="mb-4">
          <ol class="breadcrumb" style="font-size:14px;">
            <li class="breadcrumb-item"><a href="../../index.html">Home</a></li>
            <li class="breadcrumb-item"><a href="blog-listing.html">Blogs</a></li>
            <li class="breadcrumb-item"><a href="category.html?id=${category.id}">${category.name}</a></li>
            <li class="breadcrumb-item active">${truncate(blog.title, 40)}</li>
          </ol>
        </nav>

        <span class="badge-custom badge-published mb-3 d-inline-block"><i class="bi bi-folder me-1"></i>${category.name}</span>
        <h1 style="font-size:36px; margin-bottom:16px;">${blog.title}</h1>

        <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
          <div class="d-flex align-items-center gap-2">
            <img src="${author.avatar}" class="avatar avatar-md" alt="${author.name}">
            <div>
              <strong style="font-size:15px;">${author.name}</strong>
              <div class="text-small text-muted-custom">${formatDate(blog.createdAt)} · ${blog.readTime} read</div>
            </div>
          </div>
          <div class="ms-auto d-flex gap-2">
            <span class="share-btn" title="Share on Twitter"><i class="bi bi-twitter-x"></i></span>
            <span class="share-btn" title="Share on LinkedIn"><i class="bi bi-linkedin"></i></span>
            <span class="share-btn" title="Copy Link" id="copyLinkBtn"><i class="bi bi-link-45deg"></i></span>
          </div>
        </div>

        <img src="${blog.image}" alt="${blog.title}" class="blog-hero-img mb-4">

        <div class="blog-content">
          ${blog.content}
        </div>

        <div class="d-flex align-items-center justify-content-between mt-4 pt-4 border-top">
          <div class="d-flex align-items-center gap-4">
            <span class="like-btn d-flex align-items-center gap-2" id="likeBtn">
              <i class="bi bi-heart" style="font-size:20px;"></i>
              <span id="likeCount">${blog.likes}</span>
            </span>
            <span class="text-muted-custom"><i class="bi bi-eye me-1"></i> ${formatNumber(blog.views)} views</span>
            <span class="text-muted-custom"><i class="bi bi-chat me-1"></i> ${blog.commentsCount} comments</span>
          </div>
          <div class="d-flex gap-2">
            ${blog.tags.map(t => `<a href="search-results.html?q=${t}" class="tag">${t}</a>`).join('')}
          </div>
        </div>
      `;

            // Like button
            document.getElementById('likeBtn').addEventListener('click', function () {
                this.classList.toggle('liked');
                const icon = this.querySelector('i');
                const count = document.getElementById('likeCount');
                if (this.classList.contains('liked')) {
                    icon.className = 'bi bi-heart-fill';
                    count.textContent = parseInt(count.textContent) + 1;
                } else {
                    icon.className = 'bi bi-heart';
                    count.textContent = parseInt(count.textContent) - 1;
                }
            });

            // Copy link
            document.getElementById('copyLinkBtn').addEventListener('click', () => {
                navigator.clipboard.writeText(window.location.href);
                showToast('Link copied to clipboard!', 'success');
            });

            // Author widget
            document.getElementById('authorWidget').innerHTML = `
        <div class="text-center">
          <img src="${author.avatar}" class="avatar avatar-xl mb-3" alt="${author.name}">
          <h5 class="mb-1">${author.name}</h5>
          <p class="text-small text-muted-custom mb-3">@${author.username}</p>
          <p class="text-small">${author.bio}</p>
          <div class="d-flex justify-content-center gap-4 mt-3 mb-3">
            <div class="text-center"><strong>${author.blogCount}</strong><div class="text-caption text-muted-custom">Posts</div></div>
            <div class="text-center"><strong>${formatNumber(author.followers)}</strong><div class="text-caption text-muted-custom">Followers</div></div>
          </div>
          <button class="btn btn-gradient btn-sm w-100">Follow</button>
        </div>
      `;

            // Related posts
            const related = blogModel.getByCategory(blog.categoryId).filter(b => b.id !== blog.id).slice(0, 3);
            document.getElementById('relatedPosts').innerHTML = related.length ? related.map(b => `
        <a href="single-blog.html?id=${b.id}" class="d-flex gap-3 mb-3 text-decoration-none" style="color:inherit;">
          <img src="${b.image}" style="width:80px; height:60px; object-fit:cover; border-radius:8px;" alt="${b.title}">
          <div>
            <h6 style="font-size:14px; margin-bottom:4px; line-height:1.4;">${truncate(b.title, 50)}</h6>
            <small class="text-muted-custom">${formatDate(b.createdAt)}</small>
          </div>
        </a>
      `).join('') : '<p class="text-muted-custom text-small">No related posts found</p>';

            // Tags
            const allTags = [...new Set(blogModel.getPublished().flatMap(b => b.tags))];
            document.getElementById('tagCloud').innerHTML = allTags.map(t => `<a href="search-results.html?q=${t}" class="tag">${t}</a>`).join('');

            // Comments
            const comments = commentModel.getByBlogId(blogId);
            renderComments(comments);

            document.getElementById('postCommentBtn').addEventListener('click', () => {
                const text = document.getElementById('commentText').value.trim();
                if (text) {
                    showToast('Comment posted successfully!', 'success');
                    document.getElementById('commentText').value = '';
                    const currentUser = userModel.getCurrentUser();
                    const newComment = { text, createdAt: new Date().toISOString().split('T')[0], likes: 0 };
                    const newHtml = `
            <div class="comment-item slide-up">
              <img src="${currentUser.avatar}" class="avatar avatar-md" alt="${currentUser.name}">
              <div>
                <div class="d-flex align-items-center gap-2">
                  <span class="comment-author">${currentUser.name}</span>
                  <span class="comment-date">Just now</span>
                </div>
                <p class="comment-text">${text}</p>
              </div>
            </div>
          `;
                    document.getElementById('commentsList').insertAdjacentHTML('afterbegin', newHtml);
                } else {
                    showToast('Please write a comment first', 'warning');
                }
            });

            function renderComments(comments) {
                const list = document.getElementById('commentsList');
                if (comments.length === 0) {
                    list.innerHTML = '<p class="text-muted-custom">No comments yet. Be the first to comment!</p>';
                    return;
                }
                list.innerHTML = comments.map(c => {
                    const u = userModel.getById(c.userId);
                    return `
            <div class="comment-item">
              <img src="${u ? u.avatar : ''}" class="avatar avatar-md" alt="${u ? u.name : 'User'}">
              <div style="flex:1;">
                <div class="d-flex align-items-center gap-2">
                  <span class="comment-author">${u ? u.name : 'Anonymous'}</span>
                  <span class="comment-date">${timeAgo(c.createdAt)}</span>
                </div>
                <p class="comment-text">${c.text}</p>
                <div class="d-flex gap-3">
                  <span class="text-small text-muted-custom" style="cursor:pointer;"><i class="bi bi-heart"></i> ${c.likes}</span>
                  <span class="text-small text-muted-custom" style="cursor:pointer;"><i class="bi bi-reply"></i> Reply</span>
                </div>
              </div>
            </div>
          `;
                }).join('');
            }
        });
    </script>
</body>

</html>
