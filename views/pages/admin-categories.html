<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage categories — Admin Panel.">
    <title>Manage Categories — Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../assets/css/styles.css" rel="stylesheet">
</head>

<body>

    <div class="dashboard-wrapper">
        <aside class="dashboard-sidebar" style="background:linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);">
            <div class="sidebar-brand"><i class="bi bi-shield-check me-2"></i>Admin Panel</div>
            <div class="sidebar-section-title">Overview</div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
            </nav>
            <div class="sidebar-section-title">Content</div>
            <nav class="sidebar-nav">
                <a href="admin-blogs.html" class="nav-link"><i class="bi bi-journal-text"></i> Manage Blogs</a>
                <a href="admin-categories.html" class="nav-link active"><i class="bi bi-folder"></i> Categories</a>
                <a href="admin-comments.html" class="nav-link"><i class="bi bi-chat-dots"></i> Comments</a>
            </nav>
            <div class="sidebar-section-title">Users</div>
            <nav class="sidebar-nav">
                <a href="admin-users.html" class="nav-link"><i class="bi bi-people"></i> Manage Users</a>
            </nav>
            <div class="sidebar-section-title">Navigation</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link"><i class="bi bi-person"></i> User Dashboard</a>
                <a href="../../index.html" class="nav-link"><i class="bi bi-house"></i> Back to Site</a>
            </nav>
        </aside>

        <div class="dashboard-content">
            <div class="dashboard-topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-ghost d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list"
                            style="font-size:22px;"></i></button>
                    <div class="topbar-title">
                        <h4>Manage Categories</h4>
                        <p>Create, edit, and organize blog categories</p>
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="btn btn-gradient" data-bs-toggle="modal" data-bs-target="#addCategoryModal"><i
                            class="bi bi-plus me-1"></i> Add Category</button>
                </div>
            </div>

            <div class="dashboard-main">
                <div class="row g-4" id="categoryGrid">
                    <!-- Rendered by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Category Modal -->
    <div class="modal fade" id="addCategoryModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-custom">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalTitle"><i class="bi bi-folder-plus me-2"></i>Add Category
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label-custom">Category Name</label>
                        <input type="text" class="form-control form-control-custom" id="catName"
                            placeholder="e.g. Artificial Intelligence">
                    </div>
                    <div class="mb-3">
                        <label class="form-label-custom">Description</label>
                        <textarea class="form-control form-control-custom" id="catDesc" rows="2"
                            placeholder="Brief description of this category"></textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label-custom">Icon (Bootstrap Icons)</label>
                            <select class="form-select form-control-custom" id="catIcon">
                                <option value="bi-cpu">CPU</option>
                                <option value="bi-code-slash">Code</option>
                                <option value="bi-palette">Palette</option>
                                <option value="bi-bar-chart-line">Chart</option>
                                <option value="bi-gear">Gear</option>
                                <option value="bi-phone">Phone</option>
                                <option value="bi-briefcase">Briefcase</option>
                                <option value="bi-lightning">Lightning</option>
                                <option value="bi-robot">Robot</option>
                                <option value="bi-database">Database</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label-custom">Color</label>
                            <input type="color" class="form-control form-control-custom" id="catColor" value="#667eea"
                                style="height:46px;">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-ghost" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-gradient" id="saveCategoryBtn">Save Category</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" style="position:fixed; top:80px; right:20px; z-index:9999; width:360px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../models/UserModel.js"></script>
    <script src="../../models/BlogModel.js"></script>
    <script src="../../models/CategoryModel.js"></script>
    <script src="../../models/CommentModel.js"></script>
    <script src="../../controllers/MainController.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const categories = categoryModel.getAll();
            const totalBlogCount = categories.reduce((s, c) => s + c.blogCount, 0);

            function renderCategories() {
                const grid = document.getElementById('categoryGrid');
                grid.innerHTML = categories.map(c => {
                    const pct = Math.round((c.blogCount / totalBlogCount) * 100);
                    return `
            <div class="col-md-6 col-xl-4 fade-in">
              <div class="card-custom p-4">
                <div class="d-flex align-items-start justify-content-between mb-3">
                  <div class="d-flex align-items-center gap-3">
                    <div class="btn-icon" style="background:${c.color}15; color:${c.color}; width:48px; height:48px; font-size:20px;">
                      <i class="bi ${c.icon}"></i>
                    </div>
                    <div>
                      <h6 class="mb-0">${c.name}</h6>
                      <small class="text-muted-custom">${c.slug}</small>
                    </div>
                  </div>
                  <div class="dropdown">
                    <button class="btn-icon" style="width:32px; height:32px;" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                    <ul class="dropdown-menu dropdown-menu-custom dropdown-menu-end">
                      <li><a class="dropdown-item" href="#" onclick="editCategory(${c.id})"><i class="bi bi-pencil me-2"></i>Edit</a></li>
                      <li><a class="dropdown-item text-danger" href="#" onclick="deleteCategory(${c.id})"><i class="bi bi-trash me-2"></i>Delete</a></li>
                    </ul>
                  </div>
                </div>
                <p class="text-small text-muted-custom mb-3">${c.description}</p>
                <div class="d-flex justify-content-between text-small text-muted-custom mb-2">
                  <span>${c.blogCount} articles</span>
                  <span>${pct}%</span>
                </div>
                <div class="progress" style="height:6px; border-radius:3px;">
                  <div class="progress-bar" style="width:${pct}%; background:${c.color}; border-radius:3px;"></div>
                </div>
              </div>
            </div>`;
                }).join('');
            }

            renderCategories();

            document.getElementById('saveCategoryBtn').addEventListener('click', () => {
                const name = document.getElementById('catName').value.trim();
                if (!name) { showToast('Please enter a category name', 'warning'); return; }
                bootstrap.Modal.getInstance(document.getElementById('addCategoryModal')).hide();
                showToast('Category saved successfully!', 'success');
                document.getElementById('catName').value = '';
                document.getElementById('catDesc').value = '';
            });

            window.editCategory = (id) => {
                const cat = categoryModel.getById(id);
                document.getElementById('categoryModalTitle').innerHTML = '<i class="bi bi-pencil me-2"></i>Edit Category';
                document.getElementById('catName').value = cat.name;
                document.getElementById('catDesc').value = cat.description;
                document.getElementById('catColor').value = cat.color;
                new bootstrap.Modal(document.getElementById('addCategoryModal')).show();
            };

            window.deleteCategory = (id) => {
                if (confirm('Delete this category? Blogs in this category will become uncategorized.')) {
                    showToast('Category deleted', 'success');
                }
            };
        });
    </script>
</body>

</html>
