<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your BlogSphere account.">
    <title>Login — BlogSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../assets/css/styles.css" rel="stylesheet">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <div class="auth-logo"><i class="bi bi-globe2"></i> BlogSphere</div>
                <h2>Welcome Back</h2>
                <p>Sign in to continue to your dashboard</p>
            </div>

            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label class="form-label-custom" for="email">Email Address</label>
                    <input type="email" class="form-control form-control-custom" id="email"
                        placeholder="you@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label-custom d-flex justify-content-between" for="password">
                        Password
                        <a href="forgot-password.html" class="text-small text-primary-custom">Forgot Password?</a>
                    </label>
                    <div class="position-relative">
                        <input type="password" class="form-control form-control-custom" id="password"
                            placeholder="Enter your password" required>
                        <button type="button" class="btn btn-ghost position-absolute end-0 top-0 h-100"
                            id="togglePassword" style="z-index:5;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-small" for="rememberMe">Remember me</label>
                </div>
                <button type="submit" class="btn btn-gradient w-100 py-3">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>

            <div class="text-center mt-4">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <hr class="flex-grow-1"><span class="text-muted-custom text-small">or continue with</span>
                    <hr class="flex-grow-1">
                </div>
                <div class="d-flex gap-2 justify-content-center">
                    <button class="btn btn-outline-secondary px-4" style="border-radius:var(--radius-btn);"><i
                            class="bi bi-google me-2"></i>Google</button>
                    <button class="btn btn-outline-secondary px-4" style="border-radius:var(--radius-btn);"><i
                            class="bi bi-github me-2"></i>GitHub</button>
                </div>
            </div>

            <p class="text-center mt-4 mb-0 text-small">
                Don't have an account? <a href="register.html" class="text-primary-custom fw-semibold">Create
                    Account</a>
            </p>
        </div>
    </div>

    <div id="toastContainer" style="position:fixed; top:20px; right:20px; z-index:9999; width:360px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../models/UserModel.js"></script>
    <script src="../../models/BlogModel.js"></script>
    <script src="../../models/CategoryModel.js"></script>
    <script src="../../models/CommentModel.js"></script>
    <script src="../../controllers/MainController.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pw = document.getElementById('password');
            const icon = this.querySelector('i');
            if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
            else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
        });

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            if (validateForm('loginForm')) {
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
            }
        });
    </script>
</body>

</html>
