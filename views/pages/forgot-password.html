<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your BlogSphere password.">
    <title>Forgot Password — BlogSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../assets/css/styles.css" rel="stylesheet">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card fade-in" style="max-width:480px;">
            <div class="auth-header">
                <div
                    style="width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1)); display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                    <i class="bi bi-key"
                        style="font-size:36px; background:var(--clr-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent;"></i>
                </div>
                <h2>Forgot Password?</h2>
                <p>Enter your email and we'll send a reset link</p>
            </div>

            <form id="forgotForm" novalidate>
                <div class="mb-4">
                    <label class="form-label-custom" for="email">Email Address</label>
                    <input type="email" class="form-control form-control-custom" id="email"
                        placeholder="you@example.com" required>
                </div>
                <button type="submit" class="btn btn-gradient w-100 py-3">
                    <i class="bi bi-send me-2"></i>Send Reset Link
                </button>
            </form>

            <p class="text-center mt-4 mb-0 text-small">
                Remember your password? <a href="login.html" class="text-primary-custom fw-semibold">Sign In</a>
            </p>
        </div>
    </div>

    <div id="toastContainer" style="position:fixed; top:20px; right:20px; z-index:9999; width:360px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../models/UserModel.js"></script>
    <script src="../../models/BlogModel.js"></script>
    <script src="../../models/CategoryModel.js"></script>
    <script src="../../models/CommentModel.js"></script>
    <script src="../../controllers/MainController.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', function (e) {
            e.preventDefault();
            if (validateForm('forgotForm')) {
                showToast('Password reset link sent! Check your email.', 'success');
                setTimeout(() => { window.location.href = 'reset-password.html'; }, 2000);
            }
        });
    </script>
</body>

</html>
