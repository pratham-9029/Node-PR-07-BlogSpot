<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Verify your email address for BlogSphere.">
    <title>Email Verification — BlogSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../assets/css/styles.css" rel="stylesheet">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card fade-in text-center" style="max-width:520px;">
            <div class="mb-4">
                <div
                    style="width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1)); display:flex; align-items:center; justify-content:center; margin:0 auto 24px;">
                    <i class="bi bi-envelope-check"
                        style="font-size:44px; background:var(--clr-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent;"></i>
                </div>
                <h2 style="font-size:28px;">Check Your Email</h2>
                <p class="text-muted-custom mt-2">We've sent a verification link to</p>
                <p class="fw-semibold" style="color:var(--clr-primary);">pratham@blog.com</p>
            </div>

            <div class="card-custom p-4 mb-4" style="background:var(--clr-surface);">
                <p class="text-small mb-0"><i class="bi bi-info-circle me-1 text-primary-custom"></i> Click the link in
                    the email to verify your account. The link will expire in <strong>24 hours</strong>.</p>
            </div>

            <p class="text-small text-muted-custom mb-3">Didn't receive the email?</p>
            <button class="btn btn-gradient px-4 mb-3" id="resendBtn">
                <i class="bi bi-arrow-clockwise me-2"></i>Resend Verification Email
            </button>

            <div class="mt-3">
                <p class="text-small text-muted-custom mb-2">Or enter the 6-digit code sent to your email:</p>
                <div class="d-flex gap-2 justify-content-center mb-3" id="otpInputs">
                    <input type="text" maxlength="1" class="form-control form-control-custom text-center"
                        style="width:50px; height:50px; font-size:20px; font-weight:700;">
                    <input type="text" maxlength="1" class="form-control form-control-custom text-center"
                        style="width:50px; height:50px; font-size:20px; font-weight:700;">
                    <input type="text" maxlength="1" class="form-control form-control-custom text-center"
                        style="width:50px; height:50px; font-size:20px; font-weight:700;">
                    <input type="text" maxlength="1" class="form-control form-control-custom text-center"
                        style="width:50px; height:50px; font-size:20px; font-weight:700;">
                    <input type="text" maxlength="1" class="form-control form-control-custom text-center"
                        style="width:50px; height:50px; font-size:20px; font-weight:700;">
                    <input type="text" maxlength="1" class="form-control form-control-custom text-center"
                        style="width:50px; height:50px; font-size:20px; font-weight:700;">
                </div>
                <button class="btn btn-outline-gradient px-4" id="verifyCodeBtn">Verify Code</button>
            </div>

            <hr class="my-4">
            <p class="text-small mb-0">
                <a href="login.html" class="text-primary-custom"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
            </p>
        </div>
    </div>

    <div id="toastContainer" style="position:fixed; top:20px; right:20px; z-index:9999; width:360px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../models/UserModel.js"></script>
    <script src="../../models/BlogModel.js"></script>
    <script src="../../models/CategoryModel.js"></script>
    <script src="../../models/CommentModel.js"></script>
    <script src="../../controllers/MainController.js"></script>
    <script>
        // OTP input auto-focus
        const otpInputs = document.querySelectorAll('#otpInputs input');
        otpInputs.forEach((input, idx) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && idx < otpInputs.length - 1) otpInputs[idx + 1].focus();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0) otpInputs[idx - 1].focus();
            });
        });

        document.getElementById('resendBtn').addEventListener('click', () => {
            showToast('Verification email resent!', 'success');
        });

        document.getElementById('verifyCodeBtn').addEventListener('click', () => {
            const code = Array.from(otpInputs).map(i => i.value).join('');
            if (code.length === 6) {
                showToast('Email verified successfully! 🎉', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
            } else {
                showToast('Please enter the full 6-digit code', 'warning');
            }
        });
    </script>
</body>

</html>
