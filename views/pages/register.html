<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your BlogSphere account and start writing.">
    <title>Register — BlogSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../assets/css/styles.css" rel="stylesheet">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <div class="auth-logo"><i class="bi bi-globe2"></i> BlogSphere</div>
                <h2>Create Account</h2>
                <p>Join our community of writers and readers</p>
            </div>

            <form id="registerForm" novalidate>
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label-custom" for="firstName">First Name</label>
                        <input type="text" class="form-control form-control-custom" id="firstName" placeholder="John"
                            required>
                    </div>
                    <div class="col-6">
                        <label class="form-label-custom" for="lastName">Last Name</label>
                        <input type="text" class="form-control form-control-custom" id="lastName" placeholder="Doe"
                            required>
                    </div>
                    <div class="col-12">
                        <label class="form-label-custom" for="username">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"
                                style="border:2px solid var(--clr-border); border-right:none; border-radius:var(--radius-input) 0 0 var(--radius-input); background:var(--clr-surface);">@</span>
                            <input type="text" class="form-control form-control-custom" id="username"
                                placeholder="johndoe" required style="border-left:none;">
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label-custom" for="email">Email Address</label>
                        <input type="email" class="form-control form-control-custom" id="email"
                            placeholder="john@example.com" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label-custom" for="password">Password</label>
                        <div class="position-relative">
                            <input type="password" class="form-control form-control-custom" id="password"
                                placeholder="Min 8 characters" required>
                            <button type="button" class="btn btn-ghost position-absolute end-0 top-0 h-100"
                                id="togglePassword" style="z-index:5;">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label-custom" for="confirmPassword">Confirm Password</label>
                        <input type="password" class="form-control form-control-custom" id="confirmPassword"
                            placeholder="Re-enter password" required>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                            <label class="form-check-label text-small" for="agreeTerms">
                                I agree to the <a href="#" class="text-primary-custom">Terms of Service</a> and <a
                                    href="#" class="text-primary-custom">Privacy Policy</a>
                            </label>
                        </div>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-gradient w-100 py-3">
                            <i class="bi bi-person-plus me-2"></i>Create Account
                        </button>
                    </div>
                </div>
            </form>

            <div class="text-center mt-4">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <hr class="flex-grow-1"><span class="text-muted-custom text-small">or sign up with</span>
                    <hr class="flex-grow-1">
                </div>
                <div class="d-flex gap-2 justify-content-center">
                    <button class="btn btn-outline-secondary px-4" style="border-radius:var(--radius-btn);"><i
                            class="bi bi-google me-2"></i>Google</button>
                    <button class="btn btn-outline-secondary px-4" style="border-radius:var(--radius-btn);"><i
                            class="bi bi-github me-2"></i>GitHub</button>
                </div>
            </div>

            <p class="text-center mt-4 mb-0 text-small">
                Already have an account? <a href="login.html" class="text-primary-custom fw-semibold">Sign In</a>
            </p>
        </div>
    </div>

    <div id="toastContainer" style="position:fixed; top:20px; right:20px; z-index:9999; width:360px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../models/UserModel.js"></script>
    <script src="../../models/BlogModel.js"></script>
    <script src="../../models/CategoryModel.js"></script>
    <script src="../../models/CommentModel.js"></script>
    <script src="../../controllers/MainController.js"></script>
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pw = document.getElementById('password');
            const icon = this.querySelector('i');
            if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
            else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
        });

        // Form submit
        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();
            if (validateForm('registerForm')) {
                const terms = document.getElementById('agreeTerms');
                if (!terms.checked) {
                    showToast('Please agree to the Terms of Service', 'warning');
                    return;
                }
                showToast('Account created successfully! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'email-verification.html'; }, 2000);
            }
        });
    </script>
</body>

</html>
