<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Set a new password for your BlogSphere account.">
    <title>Reset Password — BlogSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../assets/css/styles.css" rel="stylesheet">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card fade-in" style="max-width:480px;">
            <div class="auth-header">
                <div
                    style="width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1)); display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                    <i class="bi bi-shield-lock"
                        style="font-size:36px; background:var(--clr-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent;"></i>
                </div>
                <h2>Reset Password</h2>
                <p>Create a new secure password for your account</p>
            </div>

            <form id="resetForm" novalidate>
                <div class="mb-3">
                    <label class="form-label-custom" for="password">New Password</label>
                    <input type="password" class="form-control form-control-custom" id="password"
                        placeholder="Min 8 characters" required>
                    <div class="mt-2" id="strengthBar">
                        <div class="d-flex gap-1 mb-1">
                            <div style="height:4px; flex:1; border-radius:2px; background:var(--clr-border);" id="str1">
                            </div>
                            <div style="height:4px; flex:1; border-radius:2px; background:var(--clr-border);" id="str2">
                            </div>
                            <div style="height:4px; flex:1; border-radius:2px; background:var(--clr-border);" id="str3">
                            </div>
                            <div style="height:4px; flex:1; border-radius:2px; background:var(--clr-border);" id="str4">
                            </div>
                        </div>
                        <small class="text-muted-custom" id="strengthText">Enter a password</small>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label-custom" for="confirmPassword">Confirm New Password</label>
                    <input type="password" class="form-control form-control-custom" id="confirmPassword"
                        placeholder="Re-enter new password" required>
                </div>
                <button type="submit" class="btn btn-gradient w-100 py-3">
                    <i class="bi bi-check-lg me-2"></i>Reset Password
                </button>
            </form>

            <p class="text-center mt-4 mb-0 text-small">
                <a href="login.html" class="text-primary-custom"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
            </p>
        </div>
    </div>

    <div id="toastContainer" style="position:fixed; top:20px; right:20px; z-index:9999; width:360px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../models/UserModel.js"></script>
    <script src="../../models/BlogModel.js"></script>
    <script src="../../models/CategoryModel.js"></script>
    <script src="../../models/CommentModel.js"></script>
    <script src="../../controllers/MainController.js"></script>
    <script>
        // Password strength meter
        document.getElementById('password').addEventListener('input', function () {
            const val = this.value;
            let strength = 0;
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            const colors = ['#e74c3c', '#f39c12', '#3498db', '#2ecc71'];
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];

            for (let i = 1; i <= 4; i++) {
                document.getElementById('str' + i).style.background = i <= strength ? colors[strength - 1] : 'var(--clr-border)';
            }
            document.getElementById('strengthText').textContent = val.length > 0 ? labels[strength - 1] || 'Too short' : 'Enter a password';
            document.getElementById('strengthText').style.color = strength > 0 ? colors[strength - 1] : '';
        });

        document.getElementById('resetForm').addEventListener('submit', function (e) {
            e.preventDefault();
            if (validateForm('resetForm')) {
                showToast('Password reset successfully! 🎉', 'success');
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            }
        });
    </script>
</body>

</html>
