<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage all blog posts — Admin Panel.">
    <title>Manage Blogs — Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../assets/css/styles.css" rel="stylesheet">
</head>

<body>

    <div class="dashboard-wrapper">
        <aside class="dashboard-sidebar" style="background:linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);">
            <div class="sidebar-brand"><i class="bi bi-shield-check me-2"></i>Admin Panel</div>
            <div class="sidebar-section-title">Overview</div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
            </nav>
            <div class="sidebar-section-title">Content</div>
            <nav class="sidebar-nav">
                <a href="admin-blogs.html" class="nav-link active"><i class="bi bi-journal-text"></i> Manage Blogs</a>
                <a href="admin-categories.html" class="nav-link"><i class="bi bi-folder"></i> Categories</a>
                <a href="admin-comments.html" class="nav-link"><i class="bi bi-chat-dots"></i> Comments</a>
            </nav>
            <div class="sidebar-section-title">Users</div>
            <nav class="sidebar-nav">
                <a href="admin-users.html" class="nav-link"><i class="bi bi-people"></i> Manage Users</a>
            </nav>
            <div class="sidebar-section-title">Navigation</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link"><i class="bi bi-person"></i> User Dashboard</a>
                <a href="../../index.html" class="nav-link"><i class="bi bi-house"></i> Back to Site</a>
            </nav>
        </aside>

        <div class="dashboard-content">
            <div class="dashboard-topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-ghost d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list"
                            style="font-size:22px;"></i></button>
                    <div class="topbar-title">
                        <h4>Manage Blogs</h4>
                        <p>Review, approve, and manage all blog posts</p>
                    </div>
                </div>
                <div class="topbar-actions">
                    <div class="search-bar" style="max-width:250px;">
                        <i class="bi bi-search"></i>
                        <input type="text" id="adminBlogSearch" placeholder="Search blogs..." class="form-control"
                            style="padding:8px 16px 8px 40px; font-size:14px;">
                    </div>
                </div>
            </div>

            <div class="dashboard-main">
                <!-- Quick Stats -->
                <div class="row g-3 mb-4 fade-in">
                    <div class="col-auto"><span class="badge-custom badge-published px-3 py-2"><i
                                class="bi bi-check-circle me-1"></i>Published: <strong id="pubCount">0</strong></span>
                    </div>
                    <div class="col-auto"><span class="badge-custom badge-draft px-3 py-2"><i
                                class="bi bi-pencil me-1"></i>Drafts: <strong id="draftCount">0</strong></span></div>
                    <div class="col-auto"><span class="badge-custom badge-pending px-3 py-2"><i
                                class="bi bi-clock me-1"></i>Pending: <strong id="pendingCount">0</strong></span></div>
                </div>

                <!-- Filter Tabs -->
                <div class="d-flex gap-2 mb-4">
                    <button class="btn btn-gradient btn-sm" data-filter="all">All</button>
                    <button class="btn btn-ghost btn-sm" data-filter="published">Published</button>
                    <button class="btn btn-ghost btn-sm" data-filter="draft">Drafts</button>
                    <button class="btn btn-ghost btn-sm" data-filter="pending">Pending</button>
                </div>

                <!-- Blog Table -->
                <div class="table-custom fade-in">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Blog</th>
                                <th>Author</th>
                                <th>Category</th>
                                <th>Status</th>
                                <th>Views</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="blogTableBody">
                            <!-- Rendered by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" style="position:fixed; top:80px; right:20px; z-index:9999; width:360px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../models/UserModel.js"></script>
    <script src="../../models/BlogModel.js"></script>
    <script src="../../models/CategoryModel.js"></script>
    <script src="../../models/CommentModel.js"></script>
    <script src="../../controllers/MainController.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let currentFilter = 'all';
            let searchQuery = '';

            // Stats
            document.getElementById('pubCount').textContent = blogModel.getPublishedCount();
            document.getElementById('draftCount').textContent = blogModel.getDrafts().length;
            document.getElementById('pendingCount').textContent = blogModel.getPending().length;

            function renderTable() {
                let blogs = blogModel.getAll();
                if (currentFilter !== 'all') blogs = blogs.filter(b => b.status === currentFilter);
                if (searchQuery) blogs = blogs.filter(b => b.title.toLowerCase().includes(searchQuery));

                const tbody = document.getElementById('blogTableBody');
                tbody.innerHTML = blogs.map(b => {
                    const author = userModel.getById(b.authorId);
                    const cat = categoryModel.getById(b.categoryId);
                    const statusClass = b.status === 'published' ? 'badge-published' : b.status === 'draft' ? 'badge-draft' : 'badge-pending';
                    return `
            <tr>
              <td>
                <div class="d-flex align-items-center gap-3">
                  <img src="${b.image}" style="width:56px; height:40px; object-fit:cover; border-radius:6px;" alt="">
                  <div style="max-width:220px;">
                    <h6 class="text-small mb-0" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${b.title}</h6>
                    <small class="text-muted-custom">${b.readTime}</small>
                  </div>
                </div>
              </td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <img src="${author ? author.avatar : ''}" class="avatar avatar-sm" alt="">
                  <span class="text-small">${author ? author.name : 'Unknown'}</span>
                </div>
              </td>
              <td><span class="text-small">${cat ? cat.name : '-'}</span></td>
              <td><span class="badge-custom ${statusClass}">${b.status}</span></td>
              <td><span class="text-small">${formatNumber(b.views)}</span></td>
              <td><span class="text-small text-muted-custom">${formatDate(b.createdAt)}</span></td>
              <td>
                <div class="d-flex gap-1">
                  ${b.status === 'pending' ? `<button class="btn-icon" style="width:32px; height:32px;" title="Approve" onclick="approveAction(${b.id})"><i class="bi bi-check-lg" style="color:var(--clr-success);"></i></button>` : ''}
                  <a href="single-blog.html?id=${b.id}" class="btn-icon" style="width:32px; height:32px;" title="View"><i class="bi bi-eye"></i></a>
                  <button class="btn-icon" style="width:32px; height:32px;" title="Delete" onclick="deleteAction(${b.id})"><i class="bi bi-trash" style="color:var(--clr-error);"></i></button>
                </div>
              </td>
            </tr>`;
                }).join('');
            }

            // Filter tabs
            document.querySelectorAll('[data-filter]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('[data-filter]').forEach(b => b.className = 'btn btn-ghost btn-sm');
                    btn.className = 'btn btn-gradient btn-sm';
                    currentFilter = btn.dataset.filter;
                    renderTable();
                });
            });

            // Search
            document.getElementById('adminBlogSearch').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase().trim();
                renderTable();
            });

            // Actions
            window.approveAction = (id) => { showToast('Blog approved and published!', 'success'); };
            window.deleteAction = (id) => {
                if (confirm('Are you sure you want to delete this blog?')) {
                    showToast('Blog deleted successfully', 'success');
                }
            };

            renderTable();
        });
    </script>
</body>

</html>
